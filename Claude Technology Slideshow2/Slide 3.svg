<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&amp;family=Kalam:wght@400;700&amp;display=swap');
      .title { font-family: 'Caveat', 'Comic Sans MS', cursive; font-weight: 700; }
      .body  { font-family: 'Kalam', 'Comic Sans MS', cursive; }
    ]]></style>
  </defs>

  <rect width="1600" height="900" fill="#f7f5ef"/>

  <!-- TITLE -->
  <text x="800" y="80" font-size="56" text-anchor="middle" fill="#1a1a1a" class="title">Who Needs the Answers?</text>
  <path d="M 470 97 Q 800 111 1130 95" stroke="#7fb8e6" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.7"/>
  <text x="430" y="143" font-size="27" fill="#333" class="body">The cost of opacity falls on</text>
  <rect x="838" y="122" width="118" height="26" fill="#fff2a8" opacity="0.75"/>
  <text x="842" y="143" font-size="27" font-weight="bold" fill="#333" class="body">everyone</text>
  <text x="968" y="143" font-size="27" fill="#333" class="body">who needs the record.</text>
  <path d="M 430 152 L 1170 152" stroke="#999" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Center: stack of municipal records -->
  <g transform="translate(680, 380)">
    <rect x="25" y="0" width="180" height="200" rx="4" fill="#fff" stroke="#333" stroke-width="3" transform="rotate(-7 115 100)"/>
    <rect x="45" y="20" width="180" height="200" rx="4" fill="#fff" stroke="#333" stroke-width="3" transform="rotate(5 135 120)"/>
    <rect x="5" y="40" width="180" height="200" rx="4" fill="#fff9e8" stroke="#333" stroke-width="3"/>
    <text x="95" y="125" text-anchor="middle" font-size="26" font-weight="bold" fill="#333" class="body">MUNICIPAL</text>
    <text x="95" y="160" text-anchor="middle" font-size="26" font-weight="bold" fill="#333" class="body">RECORDS</text>
    <line x1="25" y1="185" x2="165" y2="185" stroke="#999" stroke-width="1.5"/>
    <line x1="25" y1="200" x2="145" y2="200" stroke="#999" stroke-width="1.5"/>
  </g>

  <!-- connector lines -->
  <path d="M 360 320 Q 540 350 670 410" stroke="#7fb8e6" stroke-width="2.5" fill="none" stroke-dasharray="6,5"/>
  <path d="M 1240 320 Q 1060 350 905 410" stroke="#7fb8e6" stroke-width="2.5" fill="none" stroke-dasharray="6,5"/>
  <path d="M 360 620 Q 540 600 670 540" stroke="#7fb8e6" stroke-width="2.5" fill="none" stroke-dasharray="6,5"/>
  <path d="M 1240 620 Q 1060 600 905 540" stroke="#7fb8e6" stroke-width="2.5" fill="none" stroke-dasharray="6,5"/>
  <path d="M 800 720 L 800 620" stroke="#7fb8e6" stroke-width="2.5" fill="none" stroke-dasharray="6,5"/>

  <!-- ===== Audience: Citizen (top-left) ===== -->
  <g transform="translate(120, 210)">
    <!-- icon -->
    <circle cx="40" cy="35" r="26" fill="#fff" stroke="#333" stroke-width="2.5"/>
    <circle cx="31" cy="32" r="3" fill="#333"/>
    <circle cx="49" cy="32" r="3" fill="#333"/>
    <path d="M 31 45 Q 40 52 49 45" stroke="#333" stroke-width="2" fill="none"/>
    <line x1="40" y1="61" x2="40" y2="105" stroke="#333" stroke-width="2.5"/>
    <line x1="40" y1="75" x2="22" y2="95" stroke="#333" stroke-width="2.5"/>
    <line x1="40" y1="75" x2="58" y2="60" stroke="#333" stroke-width="2.5"/>
    <!-- sticky label -->
    <rect x="85" y="10" width="160" height="34" fill="#cde0f0"/>
    <text x="165" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a4a72" class="body">CITIZEN</text>
    <text x="85" y="68" font-size="17" fill="#333" class="body">"What did the city</text>
    <text x="85" y="90" font-size="17" fill="#333" class="body">decide, and why?"</text>
  </g>

  <!-- ===== Audience: Council Member (top-right) ===== -->
  <g transform="translate(1170, 210)">
    <circle cx="270" cy="35" r="26" fill="#fff" stroke="#333" stroke-width="2.5"/>
    <circle cx="261" cy="32" r="3" fill="#333"/>
    <circle cx="279" cy="32" r="3" fill="#333"/>
    <path d="M 261 45 Q 270 52 279 45" stroke="#333" stroke-width="2" fill="none"/>
    <polygon points="266,61 274,61 277,95 263,95" fill="#8e5fae"/>
    <line x1="270" y1="61" x2="270" y2="105" stroke="#333" stroke-width="2.5"/>
    <line x1="270" y1="75" x2="252" y2="95" stroke="#333" stroke-width="2.5"/>
    <line x1="270" y1="75" x2="288" y2="60" stroke="#333" stroke-width="2.5"/>
    <rect x="55" y="10" width="190" height="34" fill="#d4c8e8"/>
    <text x="150" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#5a3a8a" class="body">COUNCIL MEMBER</text>
    <text x="75" y="68" font-size="17" fill="#333" class="body">"What's the history</text>
    <text x="75" y="90" font-size="17" fill="#333" class="body">before I vote?"</text>
  </g>

  <!-- ===== Audience: Journalist (mid-left) ===== -->
  <g transform="translate(120, 510)">
    <circle cx="40" cy="35" r="26" fill="#fff" stroke="#333" stroke-width="2.5"/>
    <path d="M 14 30 L 66 30 L 62 22 Q 40 14 18 22 Z" fill="#888" stroke="#333" stroke-width="2"/>
    <circle cx="31" cy="35" r="3" fill="#333"/>
    <circle cx="49" cy="35" r="3" fill="#333"/>
    <path d="M 31 47 Q 40 53 49 47" stroke="#333" stroke-width="2" fill="none"/>
    <line x1="40" y1="61" x2="40" y2="105" stroke="#333" stroke-width="2.5"/>
    <line x1="40" y1="75" x2="22" y2="95" stroke="#333" stroke-width="2.5"/>
    <line x1="40" y1="75" x2="58" y2="68" stroke="#333" stroke-width="2.5"/>
    <rect x="55" y="62" width="22" height="28" fill="#fff" stroke="#333" stroke-width="1.8"/>
    <line x1="59" y1="70" x2="73" y2="70" stroke="#999" stroke-width="1"/>
    <line x1="59" y1="76" x2="73" y2="76" stroke="#999" stroke-width="1"/>
    <rect x="90" y="10" width="155" height="34" fill="#f7d4b8"/>
    <text x="167" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#9a5a2a" class="body">JOURNALIST</text>
    <text x="90" y="68" font-size="17" fill="#333" class="body">"Trace this issue</text>
    <text x="90" y="90" font-size="17" fill="#333" class="body">across the years."</text>
  </g>

  <!-- ===== Audience: City Staff (mid-right) ===== -->
  <g transform="translate(1170, 510)">
    <circle cx="270" cy="35" r="26" fill="#fff" stroke="#333" stroke-width="2.5"/>
    <circle cx="263" cy="33" r="5" fill="none" stroke="#333" stroke-width="1.8"/>
    <circle cx="277" cy="33" r="5" fill="none" stroke="#333" stroke-width="1.8"/>
    <line x1="268" y1="33" x2="272" y2="33" stroke="#333" stroke-width="1.2"/>
    <circle cx="263" cy="33" r="1.5" fill="#333"/>
    <circle cx="277" cy="33" r="1.5" fill="#333"/>
    <path d="M 261 46 Q 270 52 279 46" stroke="#333" stroke-width="2" fill="none"/>
    <line x1="270" y1="61" x2="270" y2="105" stroke="#333" stroke-width="2.5"/>
    <line x1="270" y1="75" x2="252" y2="95" stroke="#333" stroke-width="2.5"/>
    <line x1="270" y1="75" x2="288" y2="95" stroke="#333" stroke-width="2.5"/>
    <rect x="95" y="10" width="150" height="34" fill="#c8e6c8"/>
    <text x="170" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2a6b3a" class="body">CITY STAFF</text>
    <text x="90" y="68" font-size="17" fill="#333" class="body">"Find prior actions</text>
    <text x="90" y="90" font-size="17" fill="#333" class="body">without the dig."</text>
  </g>

  <!-- ===== Audience: Civic Org (bottom) ===== -->
  <g transform="translate(640, 730)">
    <circle cx="40" cy="30" r="20" fill="#fff" stroke="#333" stroke-width="2.5"/>
    <circle cx="34" cy="28" r="2.5" fill="#333"/>
    <circle cx="46" cy="28" r="2.5" fill="#333"/>
    <path d="M 34 38 Q 40 43 46 38" stroke="#333" stroke-width="1.8" fill="none"/>
    <circle cx="85" cy="30" r="20" fill="#fff" stroke="#333" stroke-width="2.5"/>
    <circle cx="79" cy="28" r="2.5" fill="#333"/>
    <circle cx="91" cy="28" r="2.5" fill="#333"/>
    <path d="M 79 38 Q 85 43 91 38" stroke="#333" stroke-width="1.8" fill="none"/>
    <circle cx="130" cy="30" r="20" fill="#fff" stroke="#333" stroke-width="2.5"/>
    <circle cx="124" cy="28" r="2.5" fill="#333"/>
    <circle cx="136" cy="28" r="2.5" fill="#333"/>
    <path d="M 124 38 Q 130 43 136 38" stroke="#333" stroke-width="1.8" fill="none"/>
    <rect x="175" y="8" width="210" height="34" fill="#fde0b8"/>
    <text x="280" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#9a5a2a" class="body">CIVIC ORGANIZATIONS</text>
    <text x="175" y="66" font-size="17" fill="#333" class="body">"Monitor spending &amp; governance over time."</text>
  </g>

  <!-- BOTTOM TAKEAWAY -->
  <g transform="translate(100, 825)">
    <rect x="0" y="0" width="1400" height="56" rx="4" fill="none" stroke="#5a8bbc" stroke-width="3"/>
    <polygon points="40,14 46,26 59,27 49,36 53,49 40,42 27,49 31,36 21,27 34,26" fill="#f4c430" stroke="#b8860b" stroke-width="1.5"/>
    <line x1="-15" y1="18" x2="-5" y2="18" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="-20" y1="32" x2="-8" y2="32" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="-15" y1="46" x2="-5" y2="46" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="1405" y1="18" x2="1415" y2="18" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="1410" y1="32" x2="1420" y2="32" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="1405" y1="46" x2="1415" y2="46" stroke="#5a8bbc" stroke-width="2"/>
    <rect x="473" y="20" width="338" height="22" fill="#fff2a8" opacity="0.85"/>
    <text x="130" y="36" font-size="25" fill="#333" class="body">Five audiences, one</text>
    <text x="477" y="36" font-size="25" font-weight="bold" fill="#333" class="body">shared transparency gap.</text>
  </g>

  <g transform="translate(1480, 855)">
    <rect x="0" y="0" width="32" height="32" rx="3" fill="none" stroke="#333" stroke-width="2"/>
    <text x="16" y="23" text-anchor="middle" font-size="18" font-weight="bold" fill="#333" class="body">3</text>
    <text x="60" y="24" text-anchor="middle" font-size="16" fill="#666" class="body">Slide 3</text>
  </g>
</svg>
