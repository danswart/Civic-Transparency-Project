<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&amp;family=Kalam:wght@400;700&amp;display=swap');
      .title { font-family: 'Caveat', 'Comic Sans MS', cursive; font-weight: 700; }
      .body  { font-family: 'Kalam', 'Comic Sans MS', cursive; }
    ]]></style>
  </defs>

  <rect width="1600" height="900" fill="#f7f5ef"/>

  <text x="800" y="80" font-size="58" text-anchor="middle" fill="#1a1a1a" class="title">The Ask</text>
  <path d="M 680 97 Q 800 109 920 95" stroke="#7fb8e6" stroke-width="9" stroke-linecap="round" fill="none" opacity="0.7"/>
  <text x="400" y="143" font-size="27" fill="#333" class="body">First-round funding to research, design, and</text>
  <rect x="1043" y="122" width="245" height="26" fill="#fff2a8" opacity="0.75"/>
  <text x="1047" y="143" font-size="27" font-weight="bold" fill="#333" class="body">validate the right architecture.</text>
  <path d="M 400 152 L 1290 152" stroke="#999" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Three-step path -->
  <!-- TODAY -->
  <g transform="translate(80, 200)">
    <rect x="0" y="0" width="400" height="250" rx="14" fill="#fff" stroke="#999" stroke-width="3"/>
    <rect x="0" y="0" width="400" height="48" rx="14" fill="#eee" stroke="#999" stroke-width="3"/>
    <text x="200" y="33" text-anchor="middle" font-size="22" font-weight="bold" fill="#666" class="body">TODAY</text>

    <!-- prototype -->
    <rect x="130" y="75" width="140" height="80" rx="8" fill="#fff" stroke="#333" stroke-width="2.5"/>
    <circle cx="165" cy="108" r="9" fill="none" stroke="#333" stroke-width="2"/>
    <line x1="172" y1="115" x2="180" y2="123" stroke="#333" stroke-width="2"/>
    <text x="200" y="142" text-anchor="middle" font-size="14" fill="#666" class="body">keyword prototype</text>
    <text x="200" y="190" text-anchor="middle" font-size="17" fill="#333" class="body">Works, but limited.</text>
    <text x="200" y="215" text-anchor="middle" font-size="17" fill="#333" class="body">The vision is clear.</text>
  </g>

  <!-- Arrow + $ -->
  <g transform="translate(495, 295)">
    <path d="M 0 30 L 70 30" stroke="#f4c430" stroke-width="7" fill="none" marker-end="url(#a12)"/>
    <circle cx="40" cy="-2" r="20" fill="#f4c430" stroke="#b8860b" stroke-width="2.5"/>
    <text x="40" y="6" text-anchor="middle" font-size="24" font-weight="bold" fill="#9a6a1a" class="body">$</text>
    <text x="42" y="68" text-anchor="middle" font-size="15" fill="#666" class="body">Round 1</text>
  </g>

  <!-- FEASIBILITY -->
  <g transform="translate(600, 200)">
    <rect x="0" y="0" width="400" height="250" rx="14" fill="#fff" stroke="#5a8bbc" stroke-width="4"/>
    <rect x="0" y="0" width="400" height="48" rx="14" fill="#cde0f0" stroke="#5a8bbc" stroke-width="4"/>
    <text x="200" y="33" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a4a72" class="body">FEASIBILITY · this round</text>

    <!-- 3 mini icons -->
    <g transform="translate(70, 75)">
      <rect x="0" y="0" width="64" height="64" rx="8" fill="#fff" stroke="#333" stroke-width="2"/>
      <circle cx="32" cy="26" r="10" fill="none" stroke="#1a4a72" stroke-width="2"/>
      <path d="M 18 50 Q 32 36 46 50" fill="none" stroke="#1a4a72" stroke-width="2"/>
    </g>
    <g transform="translate(168, 75)">
      <rect x="0" y="0" width="64" height="64" rx="8" fill="#fff" stroke="#333" stroke-width="2"/>
      <circle cx="32" cy="32" r="16" fill="none" stroke="#2a8c4a" stroke-width="2"/>
      <path d="M 26 32 L 30 36 L 40 26" stroke="#2a8c4a" stroke-width="2.2" fill="none"/>
    </g>
    <g transform="translate(266, 75)">
      <rect x="0" y="0" width="64" height="64" rx="8" fill="#fff" stroke="#333" stroke-width="2"/>
      <line x1="14" y1="48" x2="50" y2="48" stroke="#9a6a1a" stroke-width="2"/>
      <rect x="16" y="32" width="9" height="16" fill="#f4c430"/>
      <rect x="28" y="22" width="9" height="26" fill="#f4c430"/>
      <rect x="40" y="14" width="9" height="34" fill="#f4c430"/>
    </g>

    <text x="200" y="175" text-anchor="middle" font-size="17" fill="#333" class="body">Experts + architecture +</text>
    <text x="200" y="198" text-anchor="middle" font-size="17" fill="#333" class="body">budget + roadmap</text>
    <text x="200" y="228" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a4a72" class="body">→ a validated plan</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(1015, 295)">
    <path d="M 0 30 L 70 30" stroke="#2a8c4a" stroke-width="7" fill="none" marker-end="url(#a12b)"/>
    <text x="40" y="68" text-anchor="middle" font-size="15" fill="#666" class="body">Round 2+</text>
  </g>

  <!-- PILOT & SCALE -->
  <g transform="translate(1120, 200)">
    <rect x="0" y="0" width="400" height="250" rx="14" fill="#fff" stroke="#2a8c4a" stroke-width="4"/>
    <rect x="0" y="0" width="400" height="48" rx="14" fill="#d4eed4" stroke="#2a8c4a" stroke-width="4"/>
    <text x="200" y="33" text-anchor="middle" font-size="22" font-weight="bold" fill="#2a6b3a" class="body">PILOT &amp; SCALE</text>

    <!-- chatbot -->
    <g transform="translate(150, 70)">
      <rect x="0" y="12" width="100" height="74" rx="16" fill="#cde0f0" stroke="#333" stroke-width="2.5"/>
      <circle cx="32" cy="46" r="9" fill="#5a8bbc"/>
      <circle cx="68" cy="46" r="9" fill="#5a8bbc"/>
      <path d="M 32 66 Q 50 78 68 66" stroke="#333" stroke-width="2" fill="none"/>
      <line x1="20" y1="12" x2="14" y2="0" stroke="#333" stroke-width="2.5"/>
      <line x1="80" y1="12" x2="86" y2="0" stroke="#333" stroke-width="2.5"/>
      <circle cx="14" cy="0" r="3.5" fill="#5a8bbc"/>
      <circle cx="86" cy="0" r="3.5" fill="#5a8bbc"/>
    </g>
    <text x="200" y="190" text-anchor="middle" font-size="17" fill="#333" class="body">Working assistant deployed</text>
    <text x="200" y="225" text-anchor="middle" font-size="18" font-weight="bold" fill="#2a6b3a" class="body">→ scalable to many entities</text>
  </g>

  <defs>
    <marker id="a12" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f4c430"/>
    </marker>
    <marker id="a12b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2a8c4a"/>
    </marker>
  </defs>

  <!-- Anchor message box -->
  <g transform="translate(250, 490)">
    <rect x="0" y="0" width="1100" height="150" rx="16" fill="#fffaf0" stroke="#f4c430" stroke-width="5"/>
    <text x="550" y="55" text-anchor="middle" font-size="34" fill="#1a4a72" class="title">Public documents should not merely be posted.</text>
    <rect x="610" y="80" width="158" height="30" fill="#fff2a8" opacity="0.7"/>
    <text x="550" y="103" text-anchor="middle" font-size="34" fill="#1a4a72" class="title">They should be usable.</text>
    <text x="550" y="135" text-anchor="middle" font-size="20" fill="#555" class="body">Invest in the architecture phase — and unlock everything that follows.</text>
  </g>

  <!-- BOTTOM TAKEAWAY -->
  <g transform="translate(100, 685)">
    <rect x="0" y="0" width="1400" height="60" rx="4" fill="none" stroke="#5a8bbc" stroke-width="3"/>
    <polygon points="42,15 48,28 62,29 51,38 55,52 42,44 29,52 33,38 22,29 36,28" fill="#f4c430" stroke="#b8860b" stroke-width="1.5"/>
    <line x1="-15" y1="20" x2="-5" y2="20" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="-20" y1="35" x2="-8" y2="35" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="-15" y1="50" x2="-5" y2="50" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="1405" y1="20" x2="1415" y2="20" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="1410" y1="35" x2="1420" y2="35" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="1405" y1="50" x2="1415" y2="50" stroke="#5a8bbc" stroke-width="2"/>
    <rect x="700" y="22" width="430" height="24" fill="#fff2a8" opacity="0.85"/>
    <text x="130" y="40" font-size="25" fill="#333" class="body">Round 1 is the smallest commitment that</text>
    <text x="704" y="40" font-size="25" font-weight="bold" fill="#333" class="body">answers whether to scale at all.</text>
  </g>

  <!-- closing line -->
  <text x="800" y="800" text-anchor="middle" font-size="22" fill="#555" class="body">Let's discuss what a first-round commitment looks like.</text>
  <path d="M 540 812 L 1060 812" stroke="#5a8bbc" stroke-width="2"/>

  <g transform="translate(1470, 855)">
    <rect x="0" y="0" width="38" height="32" rx="3" fill="none" stroke="#333" stroke-width="2"/>
    <text x="19" y="23" text-anchor="middle" font-size="18" font-weight="bold" fill="#333" class="body">12</text>
    <text x="73" y="24" text-anchor="middle" font-size="16" fill="#666" class="body">Slide 12</text>
  </g>
</svg>
