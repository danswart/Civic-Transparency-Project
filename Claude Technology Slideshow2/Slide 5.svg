<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&amp;family=Kalam:wght@400;700&amp;display=swap');
      .title { font-family: 'Caveat', 'Comic Sans MS', cursive; font-weight: 700; }
      .body  { font-family: 'Kalam', 'Comic Sans MS', cursive; }
    ]]></style>
  </defs>

  <rect width="1600" height="900" fill="#f7f5ef"/>

  <text x="800" y="80" font-size="56" text-anchor="middle" fill="#1a1a1a" class="title">From Symbols to Meaning</text>
  <path d="M 490 97 Q 800 111 1110 95" stroke="#7fb8e6" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.7"/>
  <text x="380" y="143" font-size="27" fill="#333" class="body">A natural-language assistant,</text>
  <rect x="828" y="122" width="362" height="26" fill="#fff2a8" opacity="0.75"/>
  <text x="832" y="143" font-size="27" font-weight="bold" fill="#333" class="body">grounded in the city's own records.</text>
  <path d="M 380 152 L 1195 152" stroke="#999" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- LEFT: citizen with rich question -->
  <g transform="translate(60, 220)">
    <circle cx="55" cy="55" r="36" fill="#fff" stroke="#333" stroke-width="2.5"/>
    <circle cx="44" cy="52" r="3.5" fill="#333"/>
    <circle cx="66" cy="52" r="3.5" fill="#333"/>
    <path d="M 44 68 Q 55 75 66 68" stroke="#333" stroke-width="2" fill="none"/>
    <line x1="55" y1="91" x2="55" y2="150" stroke="#333" stroke-width="2.5"/>
    <line x1="55" y1="108" x2="32" y2="135" stroke="#333" stroke-width="2.5"/>
    <line x1="55" y1="108" x2="78" y2="135" stroke="#333" stroke-width="2.5"/>
    <line x1="55" y1="150" x2="38" y2="190" stroke="#333" stroke-width="2.5"/>
    <line x1="55" y1="150" x2="72" y2="190" stroke="#333" stroke-width="2.5"/>

    <!-- speech bubble -->
    <rect x="120" y="0" width="320" height="150" rx="14" fill="#e8f0fa" stroke="#333" stroke-width="2.5"/>
    <polygon points="120,75 100,92 120,98" fill="#e8f0fa" stroke="#333" stroke-width="2.5"/>
    <text x="280" y="38" text-anchor="middle" font-size="18" fill="#333" class="body">"What has the city spent on</text>
    <text x="280" y="64" text-anchor="middle" font-size="18" fill="#333" class="body">stormwater since 2020, and</text>
    <text x="280" y="90" text-anchor="middle" font-size="18" fill="#333" class="body">which council votes shaped it?"</text>
    <text x="280" y="124" text-anchor="middle" font-size="15" fill="#888" class="body">— plain English, complex intent</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(520, 290)">
    <path d="M 0 0 L 42 0 L 42 -13 L 70 13 L 42 39 L 42 26 L 0 26 Z" fill="#7fb8e6" stroke="#333" stroke-width="2.5"/>
  </g>

  <!-- CENTER: AI brain -->
  <g transform="translate(610, 215)">
    <rect x="0" y="0" width="260" height="220" rx="18" fill="#fffaf0" stroke="#5a8bbc" stroke-width="3.5"/>
    <rect x="55" y="-18" width="150" height="34" fill="#d4c8e8" opacity="0.8"/>
    <text x="130" y="6" text-anchor="middle" font-size="20" font-weight="bold" fill="#5a3a8a" class="body">AI ASSISTANT</text>

    <!-- brain network -->
    <circle cx="75" cy="95" r="14" fill="#f4c430" stroke="#333" stroke-width="2"/>
    <circle cx="135" cy="72" r="14" fill="#e8826e" stroke="#333" stroke-width="2"/>
    <circle cx="195" cy="95" r="14" fill="#9ec99e" stroke="#333" stroke-width="2"/>
    <circle cx="100" cy="150" r="14" fill="#7fb8e6" stroke="#333" stroke-width="2"/>
    <circle cx="170" cy="150" r="14" fill="#c89ed4" stroke="#333" stroke-width="2"/>
    <line x1="75" y1="95" x2="135" y2="72" stroke="#333" stroke-width="2"/>
    <line x1="135" y1="72" x2="195" y2="95" stroke="#333" stroke-width="2"/>
    <line x1="75" y1="95" x2="100" y2="150" stroke="#333" stroke-width="2"/>
    <line x1="195" y1="95" x2="170" y2="150" stroke="#333" stroke-width="2"/>
    <line x1="100" y1="150" x2="170" y2="150" stroke="#333" stroke-width="2"/>
    <line x1="135" y1="72" x2="100" y2="150" stroke="#333" stroke-width="2"/>
    <line x1="135" y1="72" x2="170" y2="150" stroke="#333" stroke-width="2"/>

    <text x="130" y="200" text-anchor="middle" font-size="17" fill="#555" class="body">understands meaning</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(900, 290)">
    <path d="M 0 0 L 42 0 L 42 -13 L 70 13 L 42 39 L 42 26 L 0 26 Z" fill="#7fb8e6" stroke="#333" stroke-width="2.5"/>
  </g>

  <!-- RIGHT: source-backed answer -->
  <g transform="translate(990, 200)">
    <rect x="0" y="0" width="420" height="290" rx="14" fill="#fff" stroke="#333" stroke-width="2.5"/>
    <rect x="0" y="0" width="420" height="42" rx="14" fill="#c8e6c8"/>
    <text x="210" y="29" text-anchor="middle" font-size="20" font-weight="bold" fill="#2a6b3a" class="body">SOURCE-BACKED ANSWER</text>

    <!-- green check -->
    <circle cx="35" cy="80" r="16" fill="#d4eed4" stroke="#2a8c4a" stroke-width="2.5"/>
    <path d="M 27 80 L 34 87 L 45 70" stroke="#2a8c4a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <text x="62" y="76" font-size="17" fill="#333" class="body">Since 2020, the city spent</text>
    <text x="62" y="98" font-size="17" font-weight="bold" fill="#2a6b3a" class="body">$8.4M on stormwater capital work,</text>
    <text x="62" y="120" font-size="17" fill="#333" class="body">shaped by votes in 2021, 2023</text>
    <text x="62" y="142" font-size="17" fill="#333" class="body">&amp; 2024.</text>

    <line x1="30" y1="165" x2="390" y2="165" stroke="#ccc" stroke-width="1.5"/>
    <text x="30" y="195" font-size="16" font-weight="bold" fill="#1a4a72" class="body">📄 Sources</text>
    <text x="30" y="222" font-size="15" fill="#1a4a72" text-decoration="underline" class="body">• 2021 Capital Improvement Plan, p.47</text>
    <text x="30" y="247" font-size="15" fill="#1a4a72" text-decoration="underline" class="body">• Council Minutes — March 2023</text>
    <text x="30" y="272" font-size="15" fill="#1a4a72" text-decoration="underline" class="body">• Engineering Memo — 2024</text>
  </g>

  <!-- Bottom: documents feeding the brain -->
  <text x="800" y="555" text-anchor="middle" font-size="20" fill="#555" class="body">...all grounded in the city's existing document archive — nothing invented.</text>

  <g transform="translate(540, 580)">
    <g transform="translate(0,0)"><rect width="80" height="100" fill="#fff" stroke="#333" stroke-width="2"/><text x="40" y="55" text-anchor="middle" font-size="13" fill="#666" class="body">Agendas</text></g>
    <g transform="translate(95,0)"><rect width="80" height="100" fill="#fff" stroke="#333" stroke-width="2"/><text x="40" y="55" text-anchor="middle" font-size="13" fill="#666" class="body">Minutes</text></g>
    <g transform="translate(190,0)"><rect width="80" height="100" fill="#fff" stroke="#333" stroke-width="2"/><text x="40" y="55" text-anchor="middle" font-size="13" fill="#666" class="body">Budgets</text></g>
    <g transform="translate(285,0)"><rect width="80" height="100" fill="#fff" stroke="#333" stroke-width="2"/><text x="40" y="55" text-anchor="middle" font-size="13" fill="#666" class="body">Reports</text></g>
    <g transform="translate(380,0)"><rect width="80" height="100" fill="#fff" stroke="#333" stroke-width="2"/><text x="40" y="55" text-anchor="middle" font-size="13" fill="#666" class="body">Memos</text></g>
    <g transform="translate(475,0)"><rect width="80" height="100" fill="#fff" stroke="#333" stroke-width="2"/><text x="40" y="55" text-anchor="middle" font-size="13" fill="#666" class="body">Packets</text></g>
  </g>
  <path d="M 800 580 Q 770 520 745 440" stroke="#7fb8e6" stroke-width="3" fill="none" stroke-dasharray="6,5" marker-end="url(#a5)"/>

  <defs>
    <marker id="a5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7fb8e6"/>
    </marker>
  </defs>

  <!-- BOTTOM TAKEAWAY -->
  <g transform="translate(100, 805)">
    <rect x="0" y="0" width="1400" height="60" rx="4" fill="none" stroke="#5a8bbc" stroke-width="3"/>
    <polygon points="42,15 48,28 62,29 51,38 55,52 42,44 29,52 33,38 22,29 36,28" fill="#f4c430" stroke="#b8860b" stroke-width="1.5"/>
    <line x1="-15" y1="20" x2="-5" y2="20" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="-20" y1="35" x2="-8" y2="35" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="-15" y1="50" x2="-5" y2="50" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="1405" y1="20" x2="1415" y2="20" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="1410" y1="35" x2="1420" y2="35" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="1405" y1="50" x2="1415" y2="50" stroke="#5a8bbc" stroke-width="2"/>
    <rect x="448" y="22" width="282" height="24" fill="#fff2a8" opacity="0.85"/>
    <text x="130" y="40" font-size="25" fill="#333" class="body">Same documents.</text>
    <text x="452" y="40" font-size="25" font-weight="bold" fill="#333" class="body">A new layer of understanding.</text>
  </g>

  <g transform="translate(1480, 855)">
    <rect x="0" y="0" width="32" height="32" rx="3" fill="none" stroke="#333" stroke-width="2"/>
    <text x="16" y="23" text-anchor="middle" font-size="18" font-weight="bold" fill="#333" class="body">5</text>
    <text x="60" y="24" text-anchor="middle" font-size="16" fill="#666" class="body">Slide 5</text>
  </g>
</svg>
