<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="'Kalam', 'Comic Sans MS', cursive">
  <rect width="1600" height="900" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="800" y="80" font-size="52" font-weight="bold" text-anchor="middle" fill="#1a1a1a">The Leap: From Symbols to Meaning</text>
  <line x1="450" y1="100" x2="1150" y2="100" stroke="#f4c430" stroke-width="8" stroke-linecap="round"/>
  <text x="800" y="148" font-size="24" text-anchor="middle" fill="#555" font-style="italic">A natural-language assistant grounded in the city's own records</text>

  <!-- LEFT side: Citizen with rich question -->
  <g transform="translate(100, 260)">
    <circle cx="80" cy="80" r="42" fill="none" stroke="#333" stroke-width="3"/>
    <circle cx="65" cy="75" r="4" fill="#333"/>
    <circle cx="95" cy="75" r="4" fill="#333"/>
    <path d="M 65 95 Q 80 105 95 95" stroke="#333" stroke-width="2" fill="none"/>
    <line x1="80" y1="122" x2="80" y2="200" stroke="#333" stroke-width="3"/>
    <line x1="80" y1="145" x2="50" y2="180" stroke="#333" stroke-width="3"/>
    <line x1="80" y1="145" x2="110" y2="180" stroke="#333" stroke-width="3"/>

    <!-- Speech bubble with question -->
    <rect x="160" y="20" width="380" height="160" rx="14" fill="#fff" stroke="#333" stroke-width="3"/>
    <polygon points="160,90 130,115 160,115" fill="#fff" stroke="#333" stroke-width="3"/>
    <text x="350" y="55" text-anchor="middle" font-size="18" fill="#1a4a72">"What has the city spent</text>
    <text x="350" y="80" text-anchor="middle" font-size="18" fill="#1a4a72">on stormwater infrastructure</text>
    <text x="350" y="105" text-anchor="middle" font-size="18" fill="#1a4a72">since 2020, and which</text>
    <text x="350" y="130" text-anchor="middle" font-size="18" fill="#1a4a72">council votes shaped it?"</text>
    <text x="350" y="160" text-anchor="middle" font-size="14" fill="#888" font-style="italic">— plain English, complex intent</text>
  </g>

  <!-- Center: AI brain -->
  <g transform="translate(680, 320)">
    <rect x="0" y="0" width="240" height="200" rx="20" fill="#fffaf0" stroke="#1a4a72" stroke-width="4"/>
    <text x="120" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a4a72">AI Assistant</text>
    <!-- Brain network -->
    <circle cx="60" cy="100" r="14" fill="#f4c430" stroke="#333" stroke-width="2"/>
    <circle cx="120" cy="80" r="14" fill="#e67e22" stroke="#333" stroke-width="2"/>
    <circle cx="180" cy="100" r="14" fill="#2a8c4a" stroke="#333" stroke-width="2"/>
    <circle cx="90" cy="150" r="14" fill="#1a4a72" stroke="#333" stroke-width="2"/>
    <circle cx="150" cy="150" r="14" fill="#c0392b" stroke="#333" stroke-width="2"/>
    <line x1="60" y1="100" x2="120" y2="80" stroke="#333" stroke-width="2"/>
    <line x1="120" y1="80" x2="180" y2="100" stroke="#333" stroke-width="2"/>
    <line x1="60" y1="100" x2="90" y2="150" stroke="#333" stroke-width="2"/>
    <line x1="180" y1="100" x2="150" y2="150" stroke="#333" stroke-width="2"/>
    <line x1="90" y1="150" x2="150" y2="150" stroke="#333" stroke-width="2"/>
    <line x1="120" y1="80" x2="90" y2="150" stroke="#333" stroke-width="2"/>
    <line x1="120" y1="80" x2="150" y2="150" stroke="#333" stroke-width="2"/>

    <text x="120" y="195" text-anchor="middle" font-size="14" fill="#555" font-style="italic">understands meaning</text>
  </g>

  <!-- Arrows in -->
  <path d="M 540 380 L 680 400" stroke="#1a4a72" stroke-width="4" fill="none" marker-end="url(#arr5a)"/>
  <!-- Arrow out -->
  <path d="M 920 420 L 1080 420" stroke="#1a4a72" stroke-width="4" fill="none" marker-end="url(#arr5a)"/>

  <!-- RIGHT: Answer with citations -->
  <g transform="translate(1080, 260)">
    <rect x="0" y="40" width="420" height="280" rx="14" fill="#fff" stroke="#333" stroke-width="3"/>
    <rect x="0" y="40" width="420" height="40" rx="14" fill="#fff9e0" stroke="#333" stroke-width="3"/>
    <text x="210" y="68" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">Source-Backed Answer</text>

    <text x="20" y="110" font-size="16" fill="#333">Since 2020, the city has spent</text>
    <text x="20" y="135" font-size="16" font-weight="bold" fill="#2a8c4a">$X.XM on stormwater capital</text>
    <text x="20" y="160" font-size="16" fill="#333">improvements, shaped by votes</text>
    <text x="20" y="185" font-size="16" fill="#333">in 2021, 2023, and 2024...</text>

    <line x1="20" y1="205" x2="400" y2="205" stroke="#ccc" stroke-width="1"/>
    <text x="20" y="230" font-size="14" font-weight="bold" fill="#1a4a72">📄 Sources:</text>
    <text x="20" y="252" font-size="13" fill="#1a4a72" text-decoration="underline">• 2021 CIP Budget, p.47</text>
    <text x="20" y="272" font-size="13" fill="#1a4a72" text-decoration="underline">• Council Minutes, Mar 2023</text>
    <text x="20" y="292" font-size="13" fill="#1a4a72" text-decoration="underline">• Engineering Memo, 2024</text>
  </g>

  <!-- Bottom: documents feeding the AI -->
  <text x="800" y="610" text-anchor="middle" font-size="22" fill="#555" font-style="italic">...grounded in the city's own document archive</text>

  <g transform="translate(550, 640)">
    <rect x="0" y="0" width="70" height="90" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="35" y="50" text-anchor="middle" font-size="12" fill="#666">Agendas</text>
    <rect x="80" y="0" width="70" height="90" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="115" y="50" text-anchor="middle" font-size="12" fill="#666">Minutes</text>
    <rect x="160" y="0" width="70" height="90" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="195" y="50" text-anchor="middle" font-size="12" fill="#666">Budgets</text>
    <rect x="240" y="0" width="70" height="90" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="275" y="50" text-anchor="middle" font-size="12" fill="#666">Reports</text>
    <rect x="320" y="0" width="70" height="90" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="355" y="50" text-anchor="middle" font-size="12" fill="#666">Memos</text>
    <rect x="400" y="0" width="70" height="90" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="435" y="50" text-anchor="middle" font-size="12" fill="#666">Packets</text>
  </g>
  <!-- Arrows feeding up to brain -->
  <path d="M 800 640 Q 800 580 800 530" stroke="#1a4a72" stroke-width="3" fill="none" stroke-dasharray="6,4" marker-end="url(#arr5a)"/>

  <defs>
    <marker id="arr5a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a4a72"/>
    </marker>
  </defs>

  <!-- Bottom tagline -->
  <rect x="350" y="800" width="900" height="70" rx="10" fill="#fff9e0" stroke="#f4c430" stroke-width="4"/>
  <text x="800" y="845" text-anchor="middle" font-size="24" font-style="italic" fill="#333">Same documents. New layer of understanding.</text>
</svg>
