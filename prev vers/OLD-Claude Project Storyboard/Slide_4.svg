<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="'Kalam', 'Comic Sans MS', cursive">
  <rect width="1600" height="900" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="800" y="80" font-size="52" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Where Keyword Search Stops</text>
  <line x1="500" y1="100" x2="1100" y2="100" stroke="#f4c430" stroke-width="8" stroke-linecap="round"/>
  <text x="800" y="148" font-size="24" text-anchor="middle" fill="#555" font-style="italic">"Where does this word appear?" — useful, but not enough</text>

  <!-- LEFT: keyword search flow -->
  <g transform="translate(100, 220)">
    <text x="280" y="0" text-anchor="middle" font-size="28" font-weight="bold" fill="#2a8c4a">Existing Prototype: Keyword Match</text>

    <!-- Citizen with search box -->
    <circle cx="80" cy="80" r="38" fill="none" stroke="#333" stroke-width="3"/>
    <circle cx="68" cy="75" r="3.5" fill="#333"/>
    <circle cx="92" cy="75" r="3.5" fill="#333"/>
    <path d="M 68 95 Q 80 102 92 95" stroke="#333" stroke-width="2" fill="none"/>

    <!-- Speech bubble -->
    <rect x="160" y="40" width="260" height="80" rx="14" fill="#fff" stroke="#333" stroke-width="3"/>
    <polygon points="160,80 130,100 160,100" fill="#fff" stroke="#333" stroke-width="3"/>
    <polygon points="160,80 130,100 160,100" fill="#fff" stroke-width="0"/>
    <text x="290" y="75" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a4a72">"drainage"</text>
    <text x="290" y="100" text-anchor="middle" font-size="16" fill="#666">— exact word search</text>

    <!-- Arrow down -->
    <path d="M 280 140 L 280 200" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arr4a)"/>

    <!-- Returns documents -->
    <rect x="180" y="220" width="80" height="100" fill="#d4f1d4" stroke="#2a8c4a" stroke-width="3"/>
    <text x="220" y="265" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a8c4a">DOC 1</text>
    <text x="220" y="290" text-anchor="middle" font-size="13" fill="#444">"drainage"</text>

    <rect x="280" y="220" width="80" height="100" fill="#d4f1d4" stroke="#2a8c4a" stroke-width="3"/>
    <text x="320" y="265" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a8c4a">DOC 2</text>
    <text x="320" y="290" text-anchor="middle" font-size="13" fill="#444">"drainage"</text>

    <rect x="380" y="220" width="80" height="100" fill="#d4f1d4" stroke="#2a8c4a" stroke-width="3"/>
    <text x="420" y="265" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a8c4a">DOC 3</text>
    <text x="420" y="290" text-anchor="middle" font-size="13" fill="#444">"drainage"</text>

    <!-- Check + summary -->
    <text x="280" y="370" text-anchor="middle" font-size="22" font-weight="bold" fill="#2a8c4a">✓ Finds exact words</text>
    <text x="280" y="400" text-anchor="middle" font-size="18" fill="#555">✓ Cheap, fast, transparent</text>
    <text x="280" y="425" text-anchor="middle" font-size="18" fill="#555">✓ Already deployed</text>
  </g>

  <!-- Vertical divider -->
  <line x1="800" y1="180" x2="800" y2="820" stroke="#999" stroke-width="2" stroke-dasharray="10,8"/>

  <!-- RIGHT: limitations -->
  <g transform="translate(880, 220)">
    <text x="280" y="0" text-anchor="middle" font-size="28" font-weight="bold" fill="#c0392b">What It Cannot Do</text>

    <!-- Citizen asking richer question -->
    <circle cx="80" cy="80" r="38" fill="none" stroke="#333" stroke-width="3"/>
    <circle cx="68" cy="75" r="3.5" fill="#333"/>
    <circle cx="92" cy="75" r="3.5" fill="#333"/>
    <path d="M 68 95 Q 80 102 92 95" stroke="#333" stroke-width="2" fill="none"/>

    <!-- Richer speech bubble -->
    <rect x="150" y="20" width="430" height="120" rx="14" fill="#fff" stroke="#333" stroke-width="3"/>
    <polygon points="150,80 120,100 150,100" fill="#fff" stroke="#333" stroke-width="3"/>
    <text x="365" y="55" text-anchor="middle" font-size="18" fill="#1a4a72">"How has the city addressed</text>
    <text x="365" y="80" text-anchor="middle" font-size="18" fill="#1a4a72">recurring stormwater complaints</text>
    <text x="365" y="105" text-anchor="middle" font-size="18" fill="#1a4a72">in this neighborhood over</text>
    <text x="365" y="130" text-anchor="middle" font-size="18" fill="#1a4a72">the past 5 years?"</text>

    <!-- Arrow down -->
    <path d="M 280 160 L 280 210" stroke="#c0392b" stroke-width="3" fill="none" marker-end="url(#arr4b)"/>

    <!-- Limitations list -->
    <g transform="translate(40, 220)">
      <rect x="0" y="0" width="480" height="50" rx="6" fill="#fdeaea" stroke="#c0392b" stroke-width="2"/>
      <text x="20" y="33" font-size="20" fill="#333">✗ Doesn't know "drainage" ≈ "stormwater"</text>

      <rect x="0" y="60" width="480" height="50" rx="6" fill="#fdeaea" stroke="#c0392b" stroke-width="2"/>
      <text x="20" y="93" font-size="20" fill="#333">✗ Can't link documents across years</text>

      <rect x="0" y="120" width="480" height="50" rx="6" fill="#fdeaea" stroke="#c0392b" stroke-width="2"/>
      <text x="20" y="153" font-size="20" fill="#333">✗ No understanding of intent or context</text>

      <rect x="0" y="180" width="480" height="50" rx="6" fill="#fdeaea" stroke="#c0392b" stroke-width="2"/>
      <text x="20" y="213" font-size="20" fill="#333">✗ Cannot summarize or synthesize</text>
    </g>
  </g>

  <defs>
    <marker id="arr4a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="arr4b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- Bottom takeaway -->
  <rect x="300" y="800" width="1000" height="70" rx="10" fill="#fff9e0" stroke="#f4c430" stroke-width="4"/>
  <text x="800" y="845" text-anchor="middle" font-size="26" font-style="italic" fill="#333">Keyword search treats words as symbols — not meaning.</text>
</svg>
