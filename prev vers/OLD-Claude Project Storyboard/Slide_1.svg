<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="'Kalam', 'Comic Sans MS', cursive">
  <defs>
    <filter id="rough1" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="800" y="160" font-size="72" font-weight="bold" text-anchor="middle" fill="#1a1a1a">The Municipal Transparency Gap</text>
  <line x1="380" y1="190" x2="1220" y2="190" stroke="#f4c430" stroke-width="10" stroke-linecap="round"/>
  <text x="800" y="240" font-size="36" text-anchor="middle" fill="#444" font-style="italic">From documents posted &#8594; to knowledge that's actually usable</text>

  <!-- Big city building silhouette -->
  <g transform="translate(200, 360)">
    <rect x="0" y="100" width="120" height="280" fill="none" stroke="#333" stroke-width="4"/>
    <rect x="15" y="130" width="22" height="28" fill="#cde7f0"/>
    <rect x="50" y="130" width="22" height="28" fill="#cde7f0"/>
    <rect x="85" y="130" width="22" height="28" fill="#cde7f0"/>
    <rect x="15" y="175" width="22" height="28" fill="#cde7f0"/>
    <rect x="50" y="175" width="22" height="28" fill="#cde7f0"/>
    <rect x="85" y="175" width="22" height="28" fill="#cde7f0"/>
    <rect x="15" y="220" width="22" height="28" fill="#cde7f0"/>
    <rect x="50" y="220" width="22" height="28" fill="#cde7f0"/>
    <rect x="85" y="220" width="22" height="28" fill="#cde7f0"/>
    <rect x="48" y="270" width="26" height="50" fill="#a8c5d6"/>
    <polygon points="60,80 0,110 120,110" fill="none" stroke="#333" stroke-width="4"/>
    <line x1="60" y1="40" x2="60" y2="80" stroke="#333" stroke-width="3"/>
    <rect x="60" y="40" width="30" height="20" fill="#e63946"/>
    <text x="60" y="360" text-anchor="middle" font-size="22" fill="#333">City Hall</text>
  </g>

  <!-- Arrow with question -->
  <path d="M 380 480 Q 580 420 780 480" stroke="#e63946" stroke-width="5" fill="none" marker-end="url(#arrow1)"/>
  <defs>
    <marker id="arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e63946"/>
    </marker>
  </defs>

  <!-- Confused citizen -->
  <g transform="translate(820, 380)">
    <circle cx="80" cy="80" r="55" fill="none" stroke="#333" stroke-width="4"/>
    <circle cx="65" cy="75" r="5" fill="#333"/>
    <circle cx="95" cy="75" r="5" fill="#333"/>
    <path d="M 60 100 Q 80 90 100 100" stroke="#333" stroke-width="3" fill="none"/>
    <line x1="80" y1="135" x2="80" y2="240" stroke="#333" stroke-width="4"/>
    <line x1="80" y1="160" x2="40" y2="200" stroke="#333" stroke-width="4"/>
    <line x1="80" y1="160" x2="120" y2="200" stroke="#333" stroke-width="4"/>
    <line x1="80" y1="240" x2="55" y2="310" stroke="#333" stroke-width="4"/>
    <line x1="80" y1="240" x2="105" y2="310" stroke="#333" stroke-width="4"/>
    <!-- Question marks floating -->
    <text x="-20" y="50" font-size="48" fill="#e63946" font-weight="bold">?</text>
    <text x="170" y="40" font-size="60" fill="#e63946" font-weight="bold">?</text>
    <text x="200" y="120" font-size="36" fill="#e63946" font-weight="bold">?</text>
  </g>

  <!-- Pile of scattered documents -->
  <g transform="translate(1100, 380)">
    <rect x="30" y="60" width="100" height="130" fill="#fff" stroke="#333" stroke-width="3" transform="rotate(-12 80 125)"/>
    <text x="60" y="120" font-size="14" fill="#666" transform="rotate(-12 80 125)">PDF</text>
    <line x1="35" y1="135" x2="115" y2="135" stroke="#999" stroke-width="1" transform="rotate(-12 80 125)"/>
    <line x1="35" y1="150" x2="115" y2="150" stroke="#999" stroke-width="1" transform="rotate(-12 80 125)"/>
    <line x1="35" y1="165" x2="100" y2="165" stroke="#999" stroke-width="1" transform="rotate(-12 80 125)"/>

    <rect x="100" y="80" width="100" height="130" fill="#fff" stroke="#333" stroke-width="3" transform="rotate(8 150 145)"/>
    <text x="125" y="115" font-size="14" fill="#666" transform="rotate(8 150 145)">Agenda</text>
    <line x1="105" y1="130" x2="195" y2="130" stroke="#999" stroke-width="1" transform="rotate(8 150 145)"/>
    <line x1="105" y1="145" x2="195" y2="145" stroke="#999" stroke-width="1" transform="rotate(8 150 145)"/>
    <line x1="105" y1="160" x2="180" y2="160" stroke="#999" stroke-width="1" transform="rotate(8 150 145)"/>

    <rect x="180" y="50" width="100" height="130" fill="#fff" stroke="#333" stroke-width="3" transform="rotate(-5 230 115)"/>
    <text x="205" y="100" font-size="14" fill="#666" transform="rotate(-5 230 115)">Minutes</text>
    <line x1="185" y1="120" x2="275" y2="120" stroke="#999" stroke-width="1" transform="rotate(-5 230 115)"/>
    <line x1="185" y1="135" x2="275" y2="135" stroke="#999" stroke-width="1" transform="rotate(-5 230 115)"/>
    <line x1="185" y1="150" x2="255" y2="150" stroke="#999" stroke-width="1" transform="rotate(-5 230 115)"/>

    <rect x="60" y="180" width="100" height="130" fill="#fff" stroke="#333" stroke-width="3" transform="rotate(15 110 245)"/>
    <text x="85" y="235" font-size="14" fill="#666" transform="rotate(15 110 245)">Budget</text>
    <line x1="65" y1="250" x2="155" y2="250" stroke="#999" stroke-width="1" transform="rotate(15 110 245)"/>
    <line x1="65" y1="265" x2="155" y2="265" stroke="#999" stroke-width="1" transform="rotate(15 110 245)"/>
  </g>

  <!-- Bottom tagline -->
  <text x="800" y="780" font-size="32" text-anchor="middle" fill="#1a4a72" font-style="italic">A First-Round Funding Proposal for a Civic AI Knowledge System</text>
  <line x1="500" y1="800" x2="1100" y2="800" stroke="#1a4a72" stroke-width="3" stroke-linecap="round"/>

  <!-- Small note -->
  <text x="800" y="850" font-size="22" text-anchor="middle" fill="#666">From keyword search prototype &#8594; to enterprise-grade transparency platform</text>
</svg>
