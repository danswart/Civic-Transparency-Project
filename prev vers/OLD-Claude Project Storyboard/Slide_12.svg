<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="'Kalam', 'Comic Sans MS', cursive">
  <rect width="1600" height="900" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="800" y="90" font-size="56" font-weight="bold" text-anchor="middle" fill="#1a1a1a">The Ask</text>
  <line x1="700" y1="115" x2="900" y2="115" stroke="#f4c430" stroke-width="10" stroke-linecap="round"/>
  <text x="800" y="170" font-size="24" text-anchor="middle" fill="#555" font-style="italic">First-round funding to research, design, and validate the right architecture</text>

  <!-- Path forward visualization: 3 steps -->

  <!-- Step 1: Today -->
  <g transform="translate(120, 280)">
    <rect x="0" y="0" width="380" height="240" rx="16" fill="#fff" stroke="#999" stroke-width="3"/>
    <rect x="0" y="0" width="380" height="50" rx="16" fill="#eee" stroke="#999" stroke-width="3"/>
    <text x="190" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#666">TODAY</text>

    <!-- Small prototype -->
    <rect x="120" y="80" width="140" height="80" rx="8" fill="#fff" stroke="#333" stroke-width="3"/>
    <text x="190" y="110" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Keyword</text>
    <text x="190" y="135" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Prototype</text>
    <text x="190" y="155" text-anchor="middle" font-size="12" fill="#888">(Shiny app)</text>

    <text x="190" y="195" text-anchor="middle" font-size="15" fill="#555">Works, but limited.</text>
    <text x="190" y="218" text-anchor="middle" font-size="15" fill="#555">Vision is clear.</text>
  </g>

  <!-- Arrow with $$ -->
  <g transform="translate(510, 380)">
    <path d="M 0 30 L 90 30" stroke="#f4c430" stroke-width="6" fill="none" marker-end="url(#arr12)"/>
    <text x="45" y="15" text-anchor="middle" font-size="26" font-weight="bold" fill="#b8860b">$</text>
    <text x="45" y="60" text-anchor="middle" font-size="14" fill="#666">Round 1</text>
  </g>

  <!-- Step 2: Feasibility -->
  <g transform="translate(610, 280)">
    <rect x="0" y="0" width="380" height="240" rx="16" fill="#fff" stroke="#1a4a72" stroke-width="4"/>
    <rect x="0" y="0" width="380" height="50" rx="16" fill="#cde7f0" stroke="#1a4a72" stroke-width="4"/>
    <text x="190" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a4a72">FEASIBILITY (this round)</text>

    <!-- Research workshop -->
    <rect x="60" y="80" width="60" height="60" rx="6" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="90" y="118" text-anchor="middle" font-size="22" fill="#1a4a72">👥</text>
    <rect x="160" y="80" width="60" height="60" rx="6" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="190" y="118" text-anchor="middle" font-size="22" fill="#1a4a72">🔬</text>
    <rect x="260" y="80" width="60" height="60" rx="6" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="290" y="118" text-anchor="middle" font-size="22" fill="#1a4a72">📐</text>

    <text x="190" y="170" text-anchor="middle" font-size="15" fill="#333">Experts + architecture +</text>
    <text x="190" y="190" text-anchor="middle" font-size="15" fill="#333">budget + roadmap</text>
    <text x="190" y="218" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a4a72">A validated plan</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(1000, 380)">
    <path d="M 0 30 L 90 30" stroke="#2a8c4a" stroke-width="6" fill="none" marker-end="url(#arr12b)"/>
    <text x="45" y="60" text-anchor="middle" font-size="14" fill="#666">Round 2+</text>
  </g>

  <!-- Step 3: Pilot / scale -->
  <g transform="translate(1100, 280)">
    <rect x="0" y="0" width="380" height="240" rx="16" fill="#fff" stroke="#2a8c4a" stroke-width="4"/>
    <rect x="0" y="0" width="380" height="50" rx="16" fill="#d4f1d4" stroke="#2a8c4a" stroke-width="4"/>
    <text x="190" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#2a8c4a">PILOT &amp; SCALE</text>

    <!-- Chatbot icon -->
    <rect x="140" y="80" width="100" height="80" rx="14" fill="#fff" stroke="#333" stroke-width="3"/>
    <circle cx="170" cy="115" r="7" fill="#1a4a72"/>
    <circle cx="210" cy="115" r="7" fill="#1a4a72"/>
    <path d="M 170 138 Q 190 148 210 138" stroke="#333" stroke-width="2" fill="none"/>
    <line x1="140" y1="95" x2="125" y2="78" stroke="#333" stroke-width="3"/>
    <line x1="240" y1="95" x2="255" y2="78" stroke="#333" stroke-width="3"/>

    <text x="190" y="190" text-anchor="middle" font-size="15" fill="#333">Working assistant deployed</text>
    <text x="190" y="218" text-anchor="middle" font-size="15" font-weight="bold" fill="#2a8c4a">Scalable to many entities</text>
  </g>

  <defs>
    <marker id="arr12" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f4c430"/>
    </marker>
    <marker id="arr12b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2a8c4a"/>
    </marker>
  </defs>

  <!-- Center anchor message -->
  <g transform="translate(200, 600)">
    <rect x="0" y="0" width="1200" height="160" rx="16" fill="#fff9e0" stroke="#f4c430" stroke-width="5"/>
    <text x="600" y="50" text-anchor="middle" font-size="28" font-weight="bold" fill="#1a4a72">Public documents should not merely be posted.</text>
    <text x="600" y="90" text-anchor="middle" font-size="28" font-weight="bold" fill="#1a4a72">They should be usable.</text>
    <line x1="350" y1="105" x2="850" y2="105" stroke="#f4c430" stroke-width="3"/>
    <text x="600" y="135" text-anchor="middle" font-size="20" fill="#555" font-style="italic">Invest in the architecture phase — and unlock the rest.</text>
  </g>

  <!-- Bottom contact line -->
  <text x="800" y="820" text-anchor="middle" font-size="22" fill="#444">Let's discuss what a first-round commitment looks like.</text>
  <line x1="500" y1="835" x2="1100" y2="835" stroke="#1a4a72" stroke-width="2"/>
  <text x="800" y="870" text-anchor="middle" font-size="18" fill="#888" font-style="italic">Civic Transparency Platform · First-Round Investor Brief</text>
</svg>
