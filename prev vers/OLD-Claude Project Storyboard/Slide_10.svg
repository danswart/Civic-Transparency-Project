<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="'Kalam', 'Comic Sans MS', cursive">
  <rect width="1600" height="900" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="800" y="80" font-size="52" font-weight="bold" text-anchor="middle" fill="#1a1a1a">What a Successful Pilot Demonstrates</text>
  <line x1="380" y1="100" x2="1220" y2="100" stroke="#f4c430" stroke-width="8" stroke-linecap="round"/>
  <text x="800" y="148" font-size="22" text-anchor="middle" fill="#555" font-style="italic">The end-state of feasibility work — a working assistant grounded in a real city's archive</text>

  <!-- Left side: input flow -->
  <g transform="translate(80, 240)">
    <text x="180" y="0" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a4a72">Input</text>

    <!-- Documents stack -->
    <rect x="40" y="40" width="100" height="130" fill="#fff" stroke="#333" stroke-width="3" transform="rotate(-6 90 105)"/>
    <rect x="60" y="60" width="100" height="130" fill="#fff" stroke="#333" stroke-width="3" transform="rotate(3 110 125)"/>
    <rect x="80" y="80" width="100" height="130" fill="#fff" stroke="#333" stroke-width="3"/>
    <text x="130" y="135" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Municipal</text>
    <text x="130" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">archive</text>
    <text x="130" y="180" text-anchor="middle" font-size="12" fill="#666">(real city)</text>

    <!-- Citizen below -->
    <g transform="translate(60, 280)">
      <circle cx="60" cy="40" r="32" fill="none" stroke="#333" stroke-width="3"/>
      <circle cx="48" cy="35" r="3" fill="#333"/>
      <circle cx="72" cy="35" r="3" fill="#333"/>
      <path d="M 48 52 Q 60 60 72 52" stroke="#333" stroke-width="2" fill="none"/>
      <line x1="60" y1="72" x2="60" y2="130" stroke="#333" stroke-width="3"/>
      <line x1="60" y1="90" x2="35" y2="115" stroke="#333" stroke-width="3"/>
      <line x1="60" y1="90" x2="85" y2="115" stroke="#333" stroke-width="3"/>
      <text x="60" y="160" text-anchor="middle" font-size="16" fill="#333">Real users</text>
    </g>
  </g>

  <!-- Arrows into system -->
  <path d="M 320 320 L 540 380" stroke="#1a4a72" stroke-width="4" fill="none" marker-end="url(#arr10)"/>
  <path d="M 220 510 L 540 440" stroke="#1a4a72" stroke-width="4" fill="none" marker-end="url(#arr10)"/>

  <!-- Center: working system -->
  <g transform="translate(560, 320)">
    <rect x="0" y="0" width="440" height="280" rx="20" fill="#fffaf0" stroke="#1a4a72" stroke-width="5"/>
    <text x="220" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a4a72">Working Pilot System</text>
    <line x1="40" y1="55" x2="400" y2="55" stroke="#f4c430" stroke-width="3"/>

    <!-- Inside checklist -->
    <text x="40" y="95" font-size="18" fill="#333">✓ Ingests real municipal documents</text>
    <text x="40" y="130" font-size="18" fill="#333">✓ Answers plain-English questions</text>
    <text x="40" y="165" font-size="18" fill="#333">✓ Returns verifiable citations</text>
    <text x="40" y="200" font-size="18" fill="#333">✓ Links related records across years</text>
    <text x="40" y="235" font-size="18" fill="#333">✓ Measurable accuracy on test queries</text>
    <text x="40" y="265" font-size="14" fill="#888" font-style="italic">— with a documented cost &amp; scaling profile</text>
  </g>

  <!-- Arrow out -->
  <path d="M 1010 460 L 1180 460" stroke="#2a8c4a" stroke-width="4" fill="none" marker-end="url(#arr10b)"/>

  <!-- Right: outputs -->
  <g transform="translate(1180, 280)">
    <text x="180" y="0" text-anchor="middle" font-size="24" font-weight="bold" fill="#2a8c4a">Output</text>

    <!-- Answer card -->
    <rect x="20" y="40" width="340" height="160" rx="14" fill="#fff" stroke="#2a8c4a" stroke-width="3"/>
    <rect x="20" y="40" width="340" height="38" rx="14" fill="#d4f1d4" stroke="#2a8c4a" stroke-width="3"/>
    <text x="190" y="65" text-anchor="middle" font-size="18" font-weight="bold" fill="#2a8c4a">Source-backed answer</text>
    <text x="40" y="105" font-size="14" fill="#333">Q: "Drainage spending since 2020?"</text>
    <text x="40" y="130" font-size="14" fill="#333">A: $X.XM, with major votes</text>
    <text x="40" y="148" font-size="14" fill="#333">in 2021, 2023, 2024...</text>
    <text x="40" y="178" font-size="13" fill="#1a4a72" text-decoration="underline">📄 3 source citations</text>

    <!-- Metrics card -->
    <rect x="20" y="230" width="340" height="160" rx="14" fill="#fff" stroke="#1a4a72" stroke-width="3"/>
    <rect x="20" y="230" width="340" height="38" rx="14" fill="#cde7f0" stroke="#1a4a72" stroke-width="3"/>
    <text x="190" y="255" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a4a72">Measured outcomes</text>

    <text x="40" y="290" font-size="14" fill="#333">✓ Accuracy on benchmark queries</text>
    <text x="40" y="315" font-size="14" fill="#333">✓ Per-query cost estimate</text>
    <text x="40" y="340" font-size="14" fill="#333">✓ Scaling characteristics</text>
    <text x="40" y="365" font-size="14" fill="#333">✓ User feedback from real testers</text>
  </g>

  <defs>
    <marker id="arr10" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a4a72"/>
    </marker>
    <marker id="arr10b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2a8c4a"/>
    </marker>
  </defs>

  <!-- Bottom: takeaway -->
  <rect x="200" y="780" width="1200" height="80" rx="10" fill="#fff9e0" stroke="#f4c430" stroke-width="4"/>
  <text x="800" y="815" text-anchor="middle" font-size="22" fill="#333">Pilot success = evidence that the system works at one city's scale,</text>
  <text x="800" y="845" text-anchor="middle" font-size="22" font-style="italic" fill="#1a4a72">with a credible cost model for expansion to many more.</text>
</svg>
