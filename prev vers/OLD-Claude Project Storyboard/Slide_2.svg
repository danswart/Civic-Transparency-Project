<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="'Kalam', 'Comic Sans MS', cursive">
  <rect width="1600" height="900" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="800" y="80" font-size="52" font-weight="bold" text-anchor="middle" fill="#1a1a1a">The Transparency Paradox</text>
  <line x1="500" y1="100" x2="1100" y2="100" stroke="#f4c430" stroke-width="8" stroke-linecap="round"/>

  <!-- Divider -->
  <line x1="800" y1="160" x2="800" y2="820" stroke="#999" stroke-width="2" stroke-dasharray="10,8"/>

  <!-- LEFT: The Promise -->
  <text x="400" y="180" font-size="36" font-weight="bold" text-anchor="middle" fill="#2a8c4a">THE PROMISE</text>
  <text x="400" y="215" font-size="22" text-anchor="middle" fill="#444" font-style="italic">"Public documents are available"</text>

  <!-- Government building with check -->
  <g transform="translate(280, 260)">
    <rect x="0" y="60" width="180" height="200" fill="none" stroke="#333" stroke-width="4"/>
    <polygon points="90,20 0,60 180,60" fill="none" stroke="#333" stroke-width="4"/>
    <rect x="15" y="80" width="25" height="30" fill="#cde7f0"/>
    <rect x="55" y="80" width="25" height="30" fill="#cde7f0"/>
    <rect x="100" y="80" width="25" height="30" fill="#cde7f0"/>
    <rect x="140" y="80" width="25" height="30" fill="#cde7f0"/>
    <rect x="15" y="130" width="25" height="30" fill="#cde7f0"/>
    <rect x="55" y="130" width="25" height="30" fill="#cde7f0"/>
    <rect x="100" y="130" width="25" height="30" fill="#cde7f0"/>
    <rect x="140" y="130" width="25" height="30" fill="#cde7f0"/>
    <rect x="75" y="190" width="30" height="70" fill="#a8c5d6"/>
    <text x="90" y="295" text-anchor="middle" font-size="20" fill="#333">Municipal Website</text>
  </g>

  <!-- Documents posted -->
  <g transform="translate(180, 580)">
    <rect x="0" y="0" width="80" height="100" fill="#fff" stroke="#333" stroke-width="3"/>
    <line x1="10" y1="20" x2="70" y2="20" stroke="#888" stroke-width="2"/>
    <line x1="10" y1="35" x2="70" y2="35" stroke="#888" stroke-width="2"/>
    <line x1="10" y1="50" x2="60" y2="50" stroke="#888" stroke-width="2"/>
    <text x="40" y="78" font-size="11" text-anchor="middle" fill="#666">PDF</text>

    <rect x="120" y="0" width="80" height="100" fill="#fff" stroke="#333" stroke-width="3"/>
    <line x1="130" y1="20" x2="190" y2="20" stroke="#888" stroke-width="2"/>
    <line x1="130" y1="35" x2="190" y2="35" stroke="#888" stroke-width="2"/>
    <line x1="130" y1="50" x2="180" y2="50" stroke="#888" stroke-width="2"/>
    <text x="160" y="78" font-size="11" text-anchor="middle" fill="#666">PDF</text>

    <rect x="240" y="0" width="80" height="100" fill="#fff" stroke="#333" stroke-width="3"/>
    <line x1="250" y1="20" x2="310" y2="20" stroke="#888" stroke-width="2"/>
    <line x1="250" y1="35" x2="310" y2="35" stroke="#888" stroke-width="2"/>
    <line x1="250" y1="50" x2="300" y2="50" stroke="#888" stroke-width="2"/>
    <text x="280" y="78" font-size="11" text-anchor="middle" fill="#666">PDF</text>

    <!-- Green check -->
    <circle cx="370" cy="50" r="32" fill="#d4f1d4" stroke="#2a8c4a" stroke-width="3"/>
    <path d="M 355 50 L 370 65 L 390 38" stroke="#2a8c4a" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>

  <text x="400" y="740" font-size="24" text-anchor="middle" fill="#2a8c4a">Documents posted online ✓</text>

  <!-- RIGHT: The Reality -->
  <text x="1200" y="180" font-size="36" font-weight="bold" text-anchor="middle" fill="#c0392b">THE REALITY</text>
  <text x="1200" y="215" font-size="22" text-anchor="middle" fill="#444" font-style="italic">"...but the knowledge inside is locked"</text>

  <!-- Confused citizen at laptop -->
  <g transform="translate(1100, 270)">
    <circle cx="100" cy="60" r="42" fill="none" stroke="#333" stroke-width="3"/>
    <circle cx="85" cy="55" r="4" fill="#333"/>
    <circle cx="115" cy="55" r="4" fill="#333"/>
    <path d="M 85 80 Q 100 70 115 80" stroke="#333" stroke-width="2" fill="none"/>
    <!-- Confused lines -->
    <line x1="60" y1="20" x2="50" y2="10" stroke="#c0392b" stroke-width="3"/>
    <line x1="70" y1="10" x2="65" y2="-5" stroke="#c0392b" stroke-width="3"/>
    <text x="140" y="25" font-size="40" fill="#c0392b" font-weight="bold">?</text>
    <text x="160" y="50" font-size="32" fill="#c0392b" font-weight="bold">?</text>
    <!-- Body / laptop -->
    <line x1="100" y1="102" x2="100" y2="160" stroke="#333" stroke-width="3"/>
    <rect x="40" y="160" width="120" height="60" rx="4" fill="#cde7f0" stroke="#333" stroke-width="3"/>
    <rect x="30" y="218" width="140" height="8" fill="#a8c5d6" stroke="#333" stroke-width="2"/>
    <circle cx="100" cy="190" r="14" fill="#fff" stroke="#333" stroke-width="2"/>
  </g>

  <!-- Scattered docs / chaos -->
  <g transform="translate(950, 530)">
    <rect x="20" y="40" width="70" height="90" fill="#fff" stroke="#333" stroke-width="2" transform="rotate(-15 55 85)"/>
    <text x="55" y="80" font-size="11" text-anchor="middle" fill="#666" transform="rotate(-15 55 85)">PDF</text>
    <line x1="25" y1="95" x2="85" y2="95" stroke="#999" stroke-width="1" transform="rotate(-15 55 85)"/>
    <line x1="25" y1="105" x2="85" y2="105" stroke="#999" stroke-width="1" transform="rotate(-15 55 85)"/>

    <rect x="100" y="20" width="70" height="90" fill="#fff" stroke="#333" stroke-width="2" transform="rotate(8 135 65)"/>
    <text x="135" y="55" font-size="11" text-anchor="middle" fill="#666" transform="rotate(8 135 65)">XLSX</text>
    <line x1="105" y1="70" x2="165" y2="70" stroke="#999" stroke-width="1" transform="rotate(8 135 65)"/>

    <rect x="190" y="50" width="70" height="90" fill="#fff" stroke="#333" stroke-width="2" transform="rotate(-8 225 95)"/>
    <text x="225" y="90" font-size="11" text-anchor="middle" fill="#666" transform="rotate(-8 225 95)">DOCX</text>

    <rect x="280" y="30" width="70" height="90" fill="#fff" stroke="#333" stroke-width="2" transform="rotate(12 315 75)"/>
    <text x="315" y="65" font-size="11" text-anchor="middle" fill="#666" transform="rotate(12 315 75)">PDF</text>

    <rect x="60" y="150" width="70" height="90" fill="#fff" stroke="#333" stroke-width="2" transform="rotate(20 95 195)"/>
    <text x="95" y="190" font-size="11" text-anchor="middle" fill="#666" transform="rotate(20 95 195)">Minutes</text>

    <rect x="170" y="170" width="70" height="90" fill="#fff" stroke="#333" stroke-width="2" transform="rotate(-12 205 215)"/>
    <text x="205" y="210" font-size="11" text-anchor="middle" fill="#666" transform="rotate(-12 205 215)">Agenda</text>

    <rect x="280" y="160" width="70" height="90" fill="#fff" stroke="#333" stroke-width="2" transform="rotate(5 315 205)"/>
    <text x="315" y="200" font-size="11" text-anchor="middle" fill="#666" transform="rotate(5 315 205)">Budget</text>

    <!-- Red X over the pile -->
    <line x1="50" y1="20" x2="350" y2="270" stroke="#c0392b" stroke-width="6" opacity="0.6"/>
    <line x1="350" y1="20" x2="50" y2="270" stroke="#c0392b" stroke-width="6" opacity="0.6"/>
  </g>

  <text x="1200" y="830" font-size="22" text-anchor="middle" fill="#c0392b" font-style="italic">"Available" ≠ "Accessible"</text>
</svg>
