<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&amp;family=Kalam:wght@400;700&amp;display=swap');
      .title { font-family: 'Caveat', 'Comic Sans MS', cursive; font-weight: 700; }
      .body  { font-family: 'Kalam', 'Comic Sans MS', cursive; }
    ]]></style>
  </defs>

  <rect width="1600" height="900" fill="#f7f5ef"/>

  <text x="800" y="80" font-size="56" text-anchor="middle" fill="#1a1a1a" class="title">The Questions Funding Answers</text>
  <path d="M 430 97 Q 800 111 1170 95" stroke="#7fb8e6" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.7"/>
  <text x="430" y="143" font-size="27" fill="#333" class="body">Each has a real answer — but only with the</text>
  <rect x="1043" y="122" width="195" height="26" fill="#fff2a8" opacity="0.75"/>
  <text x="1047" y="143" font-size="27" font-weight="bold" fill="#333" class="body">right experts.</text>
  <path d="M 430 152 L 1240 152" stroke="#999" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Center: head with thought cloud -->
  <g transform="translate(700, 380)">
    <circle cx="100" cy="70" r="42" fill="#fff" stroke="#333" stroke-width="2.5"/>
    <circle cx="88" cy="66" r="3.5" fill="#333"/>
    <circle cx="112" cy="66" r="3.5" fill="#333"/>
    <path d="M 88 84 Q 100 92 112 84" stroke="#333" stroke-width="2" fill="none"/>
    <!-- thought bubbles -->
    <circle cx="70" cy="28" r="6" fill="#fff" stroke="#333" stroke-width="2"/>
    <circle cx="55" cy="14" r="9" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="100" y="150" text-anchor="middle" font-size="17" fill="#555" class="body">"What do we still</text>
    <text x="100" y="172" text-anchor="middle" font-size="17" fill="#555" class="body">need to figure out?"</text>
  </g>

  <!-- 6 question cards -->
  <!-- Q1 top-left -->
  <g transform="translate(60, 200)">
    <rect x="0" y="0" width="380" height="115" rx="14" fill="#fff" stroke="#5a8bbc" stroke-width="2.5"/>
    <circle cx="38" cy="38" r="22" fill="#cde0f0" stroke="#5a8bbc" stroke-width="2"/>
    <text x="38" y="47" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a4a72" class="body">?</text>
    <text x="72" y="46" font-size="20" font-weight="bold" fill="#1a4a72" class="body">Document processing</text>
    <text x="22" y="78" font-size="16" fill="#333" class="body">How do we reliably extract text,</text>
    <text x="22" y="100" font-size="16" fill="#333" class="body">tables &amp; structure from PDFs?</text>
  </g>

  <!-- Q2 top-right -->
  <g transform="translate(1160, 200)">
    <rect x="0" y="0" width="380" height="115" rx="14" fill="#fff" stroke="#5a8bbc" stroke-width="2.5"/>
    <circle cx="38" cy="38" r="22" fill="#cde0f0" stroke="#5a8bbc" stroke-width="2"/>
    <text x="38" y="47" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a4a72" class="body">?</text>
    <text x="72" y="46" font-size="20" font-weight="bold" fill="#1a4a72" class="body">Chunking strategy</text>
    <text x="22" y="78" font-size="16" fill="#333" class="body">How do we split documents to</text>
    <text x="22" y="100" font-size="16" fill="#333" class="body">keep context across sections?</text>
  </g>

  <!-- Q3 mid-left -->
  <g transform="translate(60, 385)">
    <rect x="0" y="0" width="380" height="115" rx="14" fill="#fff" stroke="#2a8c4a" stroke-width="2.5"/>
    <circle cx="38" cy="38" r="22" fill="#d4eed4" stroke="#2a8c4a" stroke-width="2"/>
    <text x="38" y="47" text-anchor="middle" font-size="24" font-weight="bold" fill="#2a6b3a" class="body">?</text>
    <text x="72" y="46" font-size="20" font-weight="bold" fill="#2a6b3a" class="body">Model selection</text>
    <text x="22" y="78" font-size="16" fill="#333" class="body">Open or hosted? What balances</text>
    <text x="22" y="100" font-size="16" fill="#333" class="body">accuracy, cost &amp; data control?</text>
  </g>

  <!-- Q4 mid-right -->
  <g transform="translate(1160, 385)">
    <rect x="0" y="0" width="380" height="115" rx="14" fill="#fff" stroke="#2a8c4a" stroke-width="2.5"/>
    <circle cx="38" cy="38" r="22" fill="#d4eed4" stroke="#2a8c4a" stroke-width="2"/>
    <text x="38" y="47" text-anchor="middle" font-size="24" font-weight="bold" fill="#2a6b3a" class="body">?</text>
    <text x="72" y="46" font-size="20" font-weight="bold" fill="#2a6b3a" class="body">Citation accuracy</text>
    <text x="22" y="78" font-size="16" fill="#333" class="body">How do we guarantee answers</text>
    <text x="22" y="100" font-size="16" fill="#333" class="body">point to verifiable sources?</text>
  </g>

  <!-- Q5 bottom-left -->
  <g transform="translate(60, 570)">
    <rect x="0" y="0" width="380" height="115" rx="14" fill="#fff" stroke="#c0392b" stroke-width="2.5"/>
    <circle cx="38" cy="38" r="22" fill="#fdeaea" stroke="#c0392b" stroke-width="2"/>
    <text x="38" y="47" text-anchor="middle" font-size="24" font-weight="bold" fill="#c0392b" class="body">?</text>
    <text x="72" y="46" font-size="20" font-weight="bold" fill="#c0392b" class="body">Scale &amp; cost</text>
    <text x="22" y="78" font-size="16" fill="#333" class="body">What does it cost to host,</text>
    <text x="22" y="100" font-size="16" fill="#333" class="body">maintain &amp; serve at city scale?</text>
  </g>

  <!-- Q6 bottom-right -->
  <g transform="translate(1160, 570)">
    <rect x="0" y="0" width="380" height="115" rx="14" fill="#fff" stroke="#c0392b" stroke-width="2.5"/>
    <circle cx="38" cy="38" r="22" fill="#fdeaea" stroke="#c0392b" stroke-width="2"/>
    <text x="38" y="47" text-anchor="middle" font-size="24" font-weight="bold" fill="#c0392b" class="body">?</text>
    <text x="72" y="46" font-size="20" font-weight="bold" fill="#c0392b" class="body">Governance</text>
    <text x="22" y="78" font-size="16" fill="#333" class="body">How do we handle privacy, audit</text>
    <text x="22" y="100" font-size="16" fill="#333" class="body">logs &amp; long-term public trust?</text>
  </g>

  <!-- Connectors -->
  <path d="M 700 420 Q 580 400 445 290" stroke="#999" stroke-width="2" fill="none" stroke-dasharray="5,4"/>
  <path d="M 900 420 Q 1030 400 1155 290" stroke="#999" stroke-width="2" fill="none" stroke-dasharray="5,4"/>
  <path d="M 690 450 L 445 445" stroke="#999" stroke-width="2" fill="none" stroke-dasharray="5,4"/>
  <path d="M 910 450 L 1155 445" stroke="#999" stroke-width="2" fill="none" stroke-dasharray="5,4"/>
  <path d="M 710 490 Q 580 560 445 615" stroke="#999" stroke-width="2" fill="none" stroke-dasharray="5,4"/>
  <path d="M 895 490 Q 1030 560 1155 615" stroke="#999" stroke-width="2" fill="none" stroke-dasharray="5,4"/>

  <!-- BOTTOM TAKEAWAY -->
  <g transform="translate(100, 760)">
    <rect x="0" y="0" width="1400" height="58" rx="4" fill="none" stroke="#5a8bbc" stroke-width="3"/>
    <polygon points="41,14 47,27 60,28 50,37 54,50 41,43 28,50 32,37 22,28 35,27" fill="#f4c430" stroke="#b8860b" stroke-width="1.5"/>
    <line x1="-15" y1="18" x2="-5" y2="18" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="-20" y1="33" x2="-8" y2="33" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="-15" y1="48" x2="-5" y2="48" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="1405" y1="18" x2="1415" y2="18" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="1410" y1="33" x2="1420" y2="33" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="1405" y1="48" x2="1415" y2="48" stroke="#5a8bbc" stroke-width="2"/>
    <rect x="638" y="20" width="382" height="22" fill="#fff2a8" opacity="0.85"/>
    <text x="130" y="38" font-size="24" fill="#333" class="body">Feasibility funding exists to</text>
    <text x="642" y="38" font-size="24" font-weight="bold" fill="#333" class="body">answer these responsibly.</text>
  </g>

  <g transform="translate(1480, 855)">
    <rect x="0" y="0" width="32" height="32" rx="3" fill="none" stroke="#333" stroke-width="2"/>
    <text x="16" y="23" text-anchor="middle" font-size="18" font-weight="bold" fill="#333" class="body">8</text>
    <text x="60" y="24" text-anchor="middle" font-size="16" fill="#666" class="body">Slide 8</text>
  </g>
</svg>
