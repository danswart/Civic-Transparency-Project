<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&amp;family=Kalam:wght@400;700&amp;display=swap');
      .title { font-family: 'Caveat', 'Comic Sans MS', cursive; font-weight: 700; }
      .body  { font-family: 'Kalam', 'Comic Sans MS', cursive; }
    ]]></style>
  </defs>

  <rect width="1600" height="900" fill="#f7f5ef"/>

  <text x="800" y="80" font-size="56" text-anchor="middle" fill="#1a1a1a" class="title">How It Works, Conceptually</text>
  <path d="M 460 97 Q 800 111 1140 95" stroke="#7fb8e6" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.7"/>
  <text x="455" y="143" font-size="27" fill="#333" class="body">Four stages turn raw municipal files into</text>
  <rect x="1003" y="122" width="220" height="26" fill="#fff2a8" opacity="0.75"/>
  <text x="1007" y="143" font-size="27" font-weight="bold" fill="#333" class="body">trusted answers.</text>
  <path d="M 455 152 L 1230 152" stroke="#999" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Stage 1: INGEST -->
  <g transform="translate(70, 230)">
    <rect x="0" y="40" width="290" height="290" rx="14" fill="#fff" stroke="#333" stroke-width="3"/>
    <rect x="20" y="20" width="250" height="40" rx="4" fill="#cde0f0" stroke="#333" stroke-width="2.5"/>
    <text x="145" y="48" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a4a72" class="body">1 · INGEST</text>

    <!-- doc icons -->
    <g transform="translate(45, 90)">
      <path d="M 0 0 L 40 0 L 52 12 L 52 70 L 0 70 Z" fill="#fff" stroke="#333" stroke-width="2"/>
      <rect x="8" y="40" width="36" height="16" fill="#e85a4f"/>
      <text x="26" y="52" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff" class="body">PDF</text>
    </g>
    <g transform="translate(120, 90)">
      <path d="M 0 0 L 40 0 L 52 12 L 52 70 L 0 70 Z" fill="#fff" stroke="#333" stroke-width="2"/>
      <line x1="8" y1="20" x2="44" y2="20" stroke="#999" stroke-width="1.5"/>
      <line x1="8" y1="32" x2="44" y2="32" stroke="#999" stroke-width="1.5"/>
      <line x1="8" y1="44" x2="38" y2="44" stroke="#999" stroke-width="1.5"/>
    </g>
    <g transform="translate(195, 90)">
      <rect x="0" y="0" width="50" height="70" fill="#fff" stroke="#333" stroke-width="2"/>
      <rect x="0" y="0" width="50" height="14" fill="#a8d4a8"/>
      <line x1="0" y1="28" x2="50" y2="28" stroke="#666" stroke-width="1"/>
      <line x1="0" y1="42" x2="50" y2="42" stroke="#666" stroke-width="1"/>
      <line x1="17" y1="14" x2="17" y2="70" stroke="#666" stroke-width="1"/>
      <line x1="34" y1="14" x2="34" y2="70" stroke="#666" stroke-width="1"/>
    </g>

    <text x="145" y="200" text-anchor="middle" font-size="17" fill="#333" class="body">Collect agendas, minutes,</text>
    <text x="145" y="224" text-anchor="middle" font-size="17" fill="#333" class="body">budgets, reports &amp;</text>
    <text x="145" y="248" text-anchor="middle" font-size="17" fill="#333" class="body">attachments.</text>
    <rect x="35" y="270" width="220" height="34" fill="#cde0f0"/>
    <text x="145" y="294" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a4a72" class="body">gather everything</text>
  </g>

  <!-- arrow -->
  <g transform="translate(370, 380)"><path d="M 0 0 L 30 0 L 30 -11 L 54 11 L 30 33 L 30 22 L 0 22 Z" fill="#e8826e" stroke="#333" stroke-width="2.5"/></g>

  <!-- Stage 2: STRUCTURE -->
  <g transform="translate(440, 230)">
    <rect x="0" y="40" width="290" height="290" rx="14" fill="#fff" stroke="#333" stroke-width="3"/>
    <rect x="20" y="20" width="250" height="40" rx="4" fill="#fde9b8" stroke="#333" stroke-width="2.5"/>
    <text x="145" y="48" text-anchor="middle" font-size="22" font-weight="bold" fill="#9a6a1a" class="body">2 · STRUCTURE</text>

    <!-- chunk bars -->
    <rect x="55" y="90" width="180" height="24" fill="#fdeaea" stroke="#333" stroke-width="2"/>
    <rect x="55" y="122" width="180" height="24" fill="#d4eed4" stroke="#333" stroke-width="2"/>
    <rect x="55" y="154" width="180" height="24" fill="#cde0f0" stroke="#333" stroke-width="2"/>
    <rect x="55" y="186" width="180" height="24" fill="#fde9b8" stroke="#333" stroke-width="2"/>

    <text x="145" y="248" text-anchor="middle" font-size="17" fill="#333" class="body">Chunk, tag &amp; link to</text>
    <text x="145" y="272" text-anchor="middle" font-size="17" fill="#333" class="body">topics and dates.</text>
    <rect x="40" y="288" width="210" height="34" fill="#fde9b8"/>
    <text x="145" y="312" text-anchor="middle" font-size="16" font-weight="bold" fill="#9a6a1a" class="body">make it organized</text>
  </g>

  <g transform="translate(740, 380)"><path d="M 0 0 L 30 0 L 30 -11 L 54 11 L 30 33 L 30 22 L 0 22 Z" fill="#e8826e" stroke="#333" stroke-width="2.5"/></g>

  <!-- Stage 3: EMBED -->
  <g transform="translate(810, 230)">
    <rect x="0" y="40" width="290" height="290" rx="14" fill="#fff" stroke="#333" stroke-width="3"/>
    <rect x="20" y="20" width="250" height="40" rx="4" fill="#c8e6c8" stroke="#333" stroke-width="2.5"/>
    <text x="145" y="48" text-anchor="middle" font-size="22" font-weight="bold" fill="#2a6b3a" class="body">3 · EMBED</text>

    <!-- vector dots -->
    <g transform="translate(70, 85)">
      <circle cx="20" cy="30" r="9" fill="#7fb8e6"/>
      <circle cx="70" cy="15" r="9" fill="#e8826e"/>
      <circle cx="120" cy="35" r="9" fill="#9ec99e"/>
      <circle cx="45" cy="70" r="9" fill="#c89ed4"/>
      <circle cx="100" cy="78" r="9" fill="#f4c430"/>
      <circle cx="140" cy="62" r="9" fill="#7fb8e6"/>
      <line x1="20" y1="30" x2="70" y2="15" stroke="#999" stroke-width="1.5"/>
      <line x1="70" y1="15" x2="120" y2="35" stroke="#999" stroke-width="1.5"/>
      <line x1="45" y1="70" x2="100" y2="78" stroke="#999" stroke-width="1.5"/>
      <line x1="120" y1="35" x2="140" y2="62" stroke="#999" stroke-width="1.5"/>
      <line x1="20" y1="30" x2="45" y2="70" stroke="#999" stroke-width="1.5"/>
    </g>

    <text x="145" y="210" text-anchor="middle" font-size="17" fill="#333" class="body">Map meaning into a</text>
    <text x="145" y="234" text-anchor="middle" font-size="17" fill="#333" class="body">searchable index.</text>
    <rect x="45" y="270" width="200" height="34" fill="#c8e6c8"/>
    <text x="145" y="294" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a6b3a" class="body">capture meaning</text>
  </g>

  <g transform="translate(1110, 380)"><path d="M 0 0 L 30 0 L 30 -11 L 54 11 L 30 33 L 30 22 L 0 22 Z" fill="#e8826e" stroke="#333" stroke-width="2.5"/></g>

  <!-- Stage 4: RETRIEVE + CITE -->
  <g transform="translate(1180, 230)">
    <rect x="0" y="40" width="290" height="290" rx="14" fill="#fff" stroke="#333" stroke-width="3"/>
    <rect x="10" y="20" width="270" height="40" rx="4" fill="#f7d4b8" stroke="#333" stroke-width="2.5"/>
    <text x="145" y="48" text-anchor="middle" font-size="20" font-weight="bold" fill="#9a5a2a" class="body">4 · RETRIEVE + CITE</text>

    <!-- chatbot -->
    <g transform="translate(105, 85)">
      <rect x="0" y="10" width="80" height="60" rx="14" fill="#cde0f0" stroke="#333" stroke-width="2.5"/>
      <circle cx="25" cy="38" r="7" fill="#5a8bbc"/>
      <circle cx="55" cy="38" r="7" fill="#5a8bbc"/>
      <path d="M 25 55 Q 40 63 55 55" stroke="#333" stroke-width="2" fill="none"/>
      <line x1="15" y1="10" x2="10" y2="0" stroke="#333" stroke-width="2.5"/>
      <line x1="65" y1="10" x2="70" y2="0" stroke="#333" stroke-width="2.5"/>
      <circle cx="10" cy="0" r="3" fill="#5a8bbc"/>
      <circle cx="70" cy="0" r="3" fill="#5a8bbc"/>
    </g>

    <text x="145" y="200" text-anchor="middle" font-size="17" fill="#333" class="body">Plain-English answer +</text>
    <text x="145" y="224" text-anchor="middle" font-size="17" fill="#333" class="body">citation to source page.</text>
    <rect x="40" y="270" width="210" height="34" fill="#f7d4b8"/>
    <text x="145" y="294" text-anchor="middle" font-size="16" font-weight="bold" fill="#9a5a2a" class="body">deliver with proof</text>
  </g>

  <!-- Dashed callout below -->
  <g transform="translate(300, 580)">
    <rect x="0" y="0" width="1000" height="130" rx="6" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="7,5"/>
    <circle cx="55" cy="65" r="26" fill="#fff2a8" stroke="#b8860b" stroke-width="2.5"/>
    <text x="55" y="76" text-anchor="middle" font-size="34" font-weight="bold" fill="#b8860b" class="body">!</text>
    <text x="110" y="50" font-size="22" font-weight="bold" fill="#333" class="body">Every stage requires deliberate technical choices.</text>
    <text x="110" y="82" font-size="19" fill="#333" class="body">Chunk size, embedding model, retrieval method, citation format —</text>
    <text x="110" y="108" font-size="19" fill="#333" class="body">none of these are off-the-shelf decisions for municipal data.</text>
  </g>

  <!-- BOTTOM TAKEAWAY -->
  <g transform="translate(100, 745)">
    <rect x="0" y="0" width="1400" height="58" rx="4" fill="none" stroke="#5a8bbc" stroke-width="3"/>
    <polygon points="41,14 47,27 60,28 50,37 54,50 41,43 28,50 32,37 22,28 35,27" fill="#f4c430" stroke="#b8860b" stroke-width="1.5"/>
    <line x1="-15" y1="18" x2="-5" y2="18" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="-20" y1="33" x2="-8" y2="33" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="-15" y1="48" x2="-5" y2="48" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="1405" y1="18" x2="1415" y2="18" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="1410" y1="33" x2="1420" y2="33" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="1405" y1="48" x2="1415" y2="48" stroke="#5a8bbc" stroke-width="2"/>
    <rect x="730" y="20" width="300" height="22" fill="#fff2a8" opacity="0.85"/>
    <text x="130" y="38" font-size="24" fill="#333" class="body">The concept is simple. The architecture is</text>
    <text x="734" y="38" font-size="24" font-weight="bold" fill="#333" class="body">where the work lives.</text>
  </g>

  <g transform="translate(1480, 855)">
    <rect x="0" y="0" width="32" height="32" rx="3" fill="none" stroke="#333" stroke-width="2"/>
    <text x="16" y="23" text-anchor="middle" font-size="18" font-weight="bold" fill="#333" class="body">6</text>
    <text x="60" y="24" text-anchor="middle" font-size="16" fill="#666" class="body">Slide 6</text>
  </g>
</svg>
