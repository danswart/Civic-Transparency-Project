<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&amp;family=Kalam:wght@400;700&amp;display=swap');
      .title { font-family: 'Caveat', 'Comic Sans MS', cursive; font-weight: 700; }
      .body  { font-family: 'Kalam', 'Comic Sans MS', cursive; }
    ]]></style>
  </defs>

  <rect width="1600" height="900" fill="#f7f5ef"/>

  <text x="800" y="80" font-size="56" text-anchor="middle" fill="#1a1a1a" class="title">What a Successful Pilot Shows</text>
  <path d="M 440 97 Q 800 111 1160 95" stroke="#7fb8e6" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.7"/>
  <text x="455" y="143" font-size="27" fill="#333" class="body">A working assistant, proven on</text>
  <rect x="893" y="122" width="320" height="26" fill="#fff2a8" opacity="0.75"/>
  <text x="897" y="143" font-size="27" font-weight="bold" fill="#333" class="body">one real city's archive.</text>
  <path d="M 455 152 L 1215 152" stroke="#999" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- LEFT: inputs -->
  <g transform="translate(60, 210)">
    <rect x="60" y="0" width="200" height="36" fill="#cde0f0"/>
    <text x="160" y="26" text-anchor="middle" font-size="21" font-weight="bold" fill="#1a4a72" class="body" letter-spacing="0.5">INPUT</text>

    <!-- Document stack -->
    <g transform="translate(70, 55)">
      <rect x="20" y="0" width="110" height="135" rx="4" fill="#fff" stroke="#333" stroke-width="2.5" transform="rotate(-7 75 67)"/>
      <rect x="35" y="15" width="110" height="135" rx="4" fill="#fff" stroke="#333" stroke-width="2.5" transform="rotate(5 90 82)"/>
      <rect x="10" y="30" width="110" height="135" rx="4" fill="#fff9e8" stroke="#333" stroke-width="2.5"/>
      <text x="65" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="#333" class="body">Municipal</text>
      <text x="65" y="114" text-anchor="middle" font-size="15" font-weight="bold" fill="#333" class="body">archive</text>
      <text x="65" y="138" text-anchor="middle" font-size="13" fill="#888" class="body">(a real city)</text>
    </g>

    <!-- Real users -->
    <g transform="translate(95, 250)">
      <circle cx="60" cy="35" r="26" fill="#fff" stroke="#333" stroke-width="2.5"/>
      <circle cx="51" cy="32" r="3" fill="#333"/>
      <circle cx="69" cy="32" r="3" fill="#333"/>
      <path d="M 51 44 Q 60 50 69 44" stroke="#333" stroke-width="2" fill="none"/>
      <line x1="60" y1="61" x2="60" y2="100" stroke="#333" stroke-width="2.5"/>
      <line x1="60" y1="74" x2="42" y2="92" stroke="#333" stroke-width="2.5"/>
      <line x1="60" y1="74" x2="78" y2="92" stroke="#333" stroke-width="2.5"/>
      <text x="60" y="128" text-anchor="middle" font-size="17" fill="#333" class="body">Real testers</text>
    </g>
  </g>

  <!-- Arrows in -->
  <path d="M 330 320 L 470 370" stroke="#7fb8e6" stroke-width="3.5" fill="none" marker-end="url(#a10)"/>
  <path d="M 280 510 L 470 430" stroke="#7fb8e6" stroke-width="3.5" fill="none" marker-end="url(#a10)"/>

  <!-- CENTER: working system -->
  <g transform="translate(490, 235)">
    <rect x="0" y="0" width="430" height="320" rx="18" fill="#fffaf0" stroke="#5a8bbc" stroke-width="4"/>
    <rect x="75" y="-18" width="280" height="36" fill="#d4c8e8" opacity="0.8"/>
    <text x="215" y="7" text-anchor="middle" font-size="20" font-weight="bold" fill="#5a3a8a" class="body">WORKING PILOT SYSTEM</text>

    <text x="30" y="65" font-size="18" fill="#333" class="body">✓ Ingests real municipal documents</text>
    <text x="30" y="105" font-size="18" fill="#333" class="body">✓ Answers plain-English questions</text>
    <text x="30" y="145" font-size="18" fill="#333" class="body">✓ Returns verifiable citations</text>
    <text x="30" y="185" font-size="18" fill="#333" class="body">✓ Links related records across years</text>
    <text x="30" y="225" font-size="18" fill="#333" class="body">✓ Measurable accuracy on test queries</text>
    <line x1="30" y1="250" x2="400" y2="250" stroke="#ccc" stroke-width="1.5"/>
    <text x="215" y="285" text-anchor="middle" font-size="16" fill="#888" class="body">— with a documented cost &amp; scaling profile</text>
  </g>

  <!-- Arrow out -->
  <path d="M 920 395 L 1050 395" stroke="#2a8c4a" stroke-width="3.5" fill="none" marker-end="url(#a10b)"/>

  <!-- RIGHT: outputs -->
  <g transform="translate(1070, 200)">
    <rect x="80" y="10" width="200" height="36" fill="#c8e6c8"/>
    <text x="180" y="36" text-anchor="middle" font-size="21" font-weight="bold" fill="#2a6b3a" class="body" letter-spacing="0.5">OUTPUT</text>

    <!-- Answer card -->
    <rect x="20" y="60" width="430" height="155" rx="14" fill="#fff" stroke="#2a8c4a" stroke-width="2.5"/>
    <rect x="20" y="60" width="430" height="36" rx="14" fill="#d4eed4"/>
    <text x="235" y="85" text-anchor="middle" font-size="18" font-weight="bold" fill="#2a6b3a" class="body">Source-backed answer</text>
    <text x="40" y="122" font-size="15" fill="#333" class="body">Q: "Drainage spending since 2020?"</text>
    <text x="40" y="148" font-size="15" fill="#333" class="body">A: $8.4M, with major votes in</text>
    <text x="40" y="170" font-size="15" fill="#333" class="body">2021, 2023 &amp; 2024...</text>
    <text x="40" y="200" font-size="14" fill="#1a4a72" text-decoration="underline" class="body">📄 3 source citations attached</text>

    <!-- Metrics card -->
    <rect x="20" y="230" width="430" height="160" rx="14" fill="#fff" stroke="#5a8bbc" stroke-width="2.5"/>
    <rect x="20" y="230" width="430" height="36" rx="14" fill="#cde0f0"/>
    <text x="235" y="255" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a4a72" class="body">Measured outcomes</text>
    <text x="40" y="292" font-size="15" fill="#333" class="body">✓ Accuracy on benchmark queries</text>
    <text x="40" y="317" font-size="15" fill="#333" class="body">✓ Per-query cost estimate</text>
    <text x="40" y="342" font-size="15" fill="#333" class="body">✓ Scaling characteristics</text>
    <text x="40" y="367" font-size="15" fill="#333" class="body">✓ Feedback from real testers</text>
  </g>

  <defs>
    <marker id="a10" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7fb8e6"/>
    </marker>
    <marker id="a10b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2a8c4a"/>
    </marker>
  </defs>

  <!-- Dashed callout -->
  <g transform="translate(300, 600)">
    <rect x="0" y="0" width="1000" height="100" rx="6" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="7,5"/>
    <circle cx="55" cy="50" r="26" fill="#fff2a8" stroke="#b8860b" stroke-width="2.5"/>
    <text x="55" y="61" text-anchor="middle" font-size="34" font-weight="bold" fill="#b8860b" class="body">!</text>
    <text x="105" y="42" font-size="21" font-weight="bold" fill="#333" class="body">Pilot success = evidence the system works at one city's scale,</text>
    <text x="105" y="74" font-size="20" fill="#333" class="body">with a credible cost model for expanding to many more.</text>
  </g>

  <!-- BOTTOM TAKEAWAY -->
  <g transform="translate(100, 735)">
    <rect x="0" y="0" width="1400" height="58" rx="4" fill="none" stroke="#5a8bbc" stroke-width="3"/>
    <polygon points="41,14 47,27 60,28 50,37 54,50 41,43 28,50 32,37 22,28 35,27" fill="#f4c430" stroke="#b8860b" stroke-width="1.5"/>
    <line x1="-15" y1="18" x2="-5" y2="18" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="-20" y1="33" x2="-8" y2="33" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="-15" y1="48" x2="-5" y2="48" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="1405" y1="18" x2="1415" y2="18" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="1410" y1="33" x2="1420" y2="33" stroke="#5a8bbc" stroke-width="2"/>
    <line x1="1405" y1="48" x2="1415" y2="48" stroke="#5a8bbc" stroke-width="2"/>
    <rect x="130" y="20" width="290" height="22" fill="#fff2a8" opacity="0.85"/>
    <text x="134" y="38" font-size="24" font-weight="bold" fill="#333" class="body">Proof, not promises —</text>
    <text x="445" y="38" font-size="24" fill="#333" class="body">a measurable bridge from pilot to scale.</text>
  </g>

  <g transform="translate(1470, 855)">
    <rect x="0" y="0" width="38" height="32" rx="3" fill="none" stroke="#333" stroke-width="2"/>
    <text x="19" y="23" text-anchor="middle" font-size="18" font-weight="bold" fill="#333" class="body">10</text>
    <text x="73" y="24" text-anchor="middle" font-size="16" fill="#666" class="body">Slide 10</text>
  </g>
</svg>
